<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>405 – Método no permitido · Five a Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat Alternates', sans-serif; }
        body { min-height: 100vh; background: #fdf2f8; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .card { background: #fff; border-radius: 2rem; padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(236,72,153,0.12); border: 2px solid #fbcfe8; }
        .code { font-size: 6rem; font-weight: 800; color: #ec4899; line-height: 1; }
        .icon { font-size: 3.5rem; margin: 0.5rem 0 1rem; color: #f9a8d4; }
        h1 { font-size: 1.4rem; font-weight: 700; color: #1f2937; margin-bottom: 0.75rem; }
        p { color: #6b7280; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
        a { display: inline-flex; align-items: center; gap: 0.5rem; background: #ec4899; color: #fff; text-decoration: none; padding: 0.75rem 1.75rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.95rem; transition: background 0.2s; }
        a:hover { background: #db2777; }
        .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-size: inherit; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">405</div>
        <div class="icon"><span class="material-symbols-outlined">not_interested</span></div>
        <h1>Ese movimiento no está permitido</h1>
        <p>Intentaste hacer algo de una forma que aquí no funciona. Como intentar abrir una puerta empujando cuando dice "tirar". Te pasa a todos.</p>
        <a href="/"><span class="material-symbols-outlined" style="font-size:18px;">home</span> Volver al inicio</a>
    </div>
</body>
</html>
