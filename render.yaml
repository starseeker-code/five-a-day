databases:
  - name: fiveaday-db
    databaseName: fiveaday_db
    user: fiveaday_user
    plan: free
    region: frankfurt

services:
  - type: web
    name: fiveaday-web
    runtime: docker
    plan: free
    region: frankfurt
    branch: production-render
    dockerfilePath: ./Dockerfile
    dockerCommand: /app/entrypoint.sh
    
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: fiveaday-db
          property: connectionString
      - key: DATABASE
        value: postgres
      - key: POSTGRES_HOST
        fromDatabase:
          name: fiveaday-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: fiveaday-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: fiveaday-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: fiveaday-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: fiveaday-db
          property: password
      # Set DJANGO_SUPERUSER_USERNAME, DJANGO_SUPERUSER_EMAIL, and
      # DJANGO_SUPERUSER_PASSWORD in the Render dashboard (not in YAML).
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_SAMESITE
        value: "Strict"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_HTTPONLY
        value: "True"
      - key: CSRF_COOKIE_SAMESITE
        value: "Strict"
      - key: CSRF_TRUSTED_ORIGINS
        value: https://fiveaday-web.onrender.com
      # Set LOGIN_USERNAME and LOGIN_PASSWORD in the Render dashboard (not in YAML).
      - key: LOGIN_USERNAME
        sync: false
      - key: LOGIN_PASSWORD
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_SECRET
        sync: false
    
    healthCheckPath: /health/
    autoDeploy: true

  # Cron Job para enviar emails de cumpleaños diariamente a las 8:00 AM (hora España)
  - type: cron
    name: fiveaday-birthday-emails
    runtime: docker
    plan: free
    region: frankfurt
    branch: production-render
    dockerfilePath: ./Dockerfile
    schedule: "0 7 * * *"  # 7:00 UTC = 8:00 España (CET)
    dockerCommand: python project/manage.py send_email --template happy_birthday --birthdays
    
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        fromService:
          name: fiveaday-web
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: fiveaday-db
          property: connectionString
      - key: DATABASE
        value: postgres
      - key: POSTGRES_HOST
        fromDatabase:
          name: fiveaday-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: fiveaday-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: fiveaday-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: fiveaday-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: fiveaday-db
          property: password
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_SECRET
        sync: false