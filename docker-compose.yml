# ============================================================================
# DOCKER COMPOSE - Five a Day Application
# ============================================================================
# Este archivo orquesta todos los servicios necesarios para la aplicación.
# Servicios actuales: PostgreSQL + Django
# Servicios futuros (comentados): Redis, Celery, Frontend, Nginx


# ============================================================================
# SERVICIOS
# ============================================================================
services:
  
  # ==========================================================================
  # PostgreSQL - Base de datos principal
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: fiveaday_postgres
    restart: unless-stopped
    
    # Variables de entorno para PostgreSQL
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiveaday_db}
      POSTGRES_USER: ${POSTGRES_USER:-fiveaday_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    
    # Persistencia de datos
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./backups:/backups  # Para backups de base de datos
    
    # Puerto expuesto (solo para desarrollo local)
    ports:
      - "127.0.0.1:5432:5432"
    
    # Healthcheck: tests actual TCP auth, not just connectivity.
    # This ensures depends_on: service_healthy only passes when the web
    # container can actually authenticate (catches stale-volume password mismatches).
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD:-change_this_password} psql -h 127.0.0.1 -U ${POSTGRES_USER:-fiveaday_user} -d ${POSTGRES_DB:-fiveaday_db} -c '\\q'"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Red interna
    networks:
      - fiveaday_network

  # ==========================================================================
  # Django Application - Backend
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiveaday_django
    restart: unless-stopped
    env_file:
      - .env

    # Comando para desarrollo (usa runserver en lugar de gunicorn)
    # Para producción, comentar esta línea y usar el CMD del Dockerfile
    command: python project/manage.py runserver 0.0.0.0:8000

    # Puerto expuesto al host
    ports:
      - "8000:8000"

    # Environment overrides for Docker networking
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_HOST: db

    # Wait for PostgreSQL + Redis before starting
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    # Red interna
    networks:
      - fiveaday_network

  # ==========================================================================
  # REDIS - Message Broker for Celery
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: fiveaday_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fiveaday_network

  # ==========================================================================
  # CELERY WORKER - Async task processing
  # ==========================================================================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiveaday_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_HOST: db
    working_dir: /app/project
    command: celery -A project.celery worker -l info -Q celery,emails --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fiveaday_network

  # ==========================================================================
  # CELERY BEAT - Scheduled tasks (cron)
  # ==========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiveaday_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_HOST: db
    working_dir: /app/project
    command: celery -A project.celery beat -l info --pidfile=/tmp/celerybeat.pid --schedule=/tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fiveaday_network

  # ==========================================================================
  # NGINX - Reverse Proxy y servidor de archivos estáticos (FUTURO/PRODUCCIÓN)
  # ==========================================================================
  # Descomenta para producción. Sirve archivos estáticos y hace proxy a Django
  # nginx:
  #   image: nginx:alpine
  #   container_name: fiveaday_nginx
  #   restart: unless-stopped
  #   
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/conf.d:/etc/nginx/conf.d:ro
  #     - static_volume:/app/staticfiles:ro
  #     - media_volume:/app/mediafiles:ro
  #     - ./certbot/conf:/etc/letsencrypt:ro
  #     - ./certbot/www:/var/www/certbot:ro
  #   
  #   depends_on:
  #     - web
  #   
  #   networks:
  #     - fiveaday_network

  # ==========================================================================
  # FRONTEND - React/Vue/Next.js (FUTURO)
  # ==========================================================================
  # Descomenta cuando desarrolles el frontend separado
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: fiveaday_frontend
  #   restart: unless-stopped
  #   
  #   environment:
  #     REACT_APP_API_URL: http://web:8000
  #     NODE_ENV: ${NODE_ENV:-development}
  #   
  #   volumes:
  #     - ./frontend/src:/app/src
  #     - ./frontend/public:/app/public
  #   
  #   ports:
  #     - "3000:3000"
  #   
  #   depends_on:
  #     - web
  #   
  #   networks:
  #     - fiveaday_network

  # ==========================================================================
  # PGADMIN - Herramienta de administración PostgreSQL (OPCIONAL/DESARROLLO)
  # ==========================================================================
  # Descomenta si quieres una interfaz gráfica para gestionar PostgreSQL
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: fiveaday_pgadmin
  #   restart: unless-stopped
  #   
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@fiveaday.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   
  #   ports:
  #     - "5050:80"
  #   
  #   depends_on:
  #     - db
  #   
  #   networks:
  #     - fiveaday_network

# ============================================================================
# VOLÚMENES PERSISTENTES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  redis_data:
    driver: local
  # pgadmin_data:
  #   driver: local

# ============================================================================
# REDES
# ============================================================================
networks:
  fiveaday_network:
    driver: bridge
