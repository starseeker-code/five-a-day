# ============================================================================
# DOCKER COMPOSE - Five a Day Application
# ============================================================================
# Este archivo orquesta todos los servicios necesarios para la aplicación.
# Servicios actuales: PostgreSQL + Django
# Servicios futuros (comentados): Redis, Celery, Frontend, Nginx


# ============================================================================
# SERVICIOS
# ============================================================================
services:
  
  # ==========================================================================
  # PostgreSQL - Base de datos principal
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: fiveaday_postgres
    restart: unless-stopped
    
    # Variables de entorno para PostgreSQL
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiveaday_db}
      POSTGRES_USER: ${POSTGRES_USER:-fiveaday_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    
    # Persistencia de datos
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./backups:/backups  # Para backups de base de datos
    
    # Puerto expuesto (solo para desarrollo local)
    ports:
      - "5432:5432"
    
    # Healthcheck para verificar que PostgreSQL está listo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fiveaday_user} -d ${POSTGRES_DB:-fiveaday_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Red interna
    networks:
      - fiveaday_network

  # ==========================================================================
  # Django Application - Backend
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiveaday_django
    restart: unless-stopped
    
    # Comando para desarrollo (usa runserver en lugar de gunicorn)
    # Para producción, comentar esta línea y usar el CMD del Dockerfile
    command: python project/manage.py runserver 0.0.0.0:8000
    
    # Variables de entorno
    environment:
      # Django
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      
      # Database
      DATABASE: postgres
      POSTGRES_DB: ${POSTGRES_DB:-fiveaday_db}
      POSTGRES_USER: ${POSTGRES_USER:-fiveaday_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      
      # Superuser (desarrollo y producción)
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@fiveaday.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
      
      # Email Configuration
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_SECRET: ${EMAIL_SECRET:-}
      
      # Authentication (temporal)
      LOGIN_USERNAME: ${LOGIN_USERNAME:-admin}
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:-admin123}
    
    # Volúmenes para desarrollo (hot reload)
    volumes:
      - ./project:/app/project
      - ./docs:/app/docs
      - ./scripts:/app/scripts
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    
    # Puerto expuesto
    ports:
      - "8000:8000"
    
    # Dependencias
    depends_on:
      db:
        condition: service_healthy
    
    # Red interna
    networks:
      - fiveaday_network

