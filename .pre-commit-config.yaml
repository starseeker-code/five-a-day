repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy project/
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: bash -c "PYTHONUTF8=1 uv run bandit -r project/ -c pyproject.toml"
        language: system
        types: [python]
        pass_filenames: false
